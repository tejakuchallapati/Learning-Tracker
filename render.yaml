services:
  - type: web
    name: devtrack-backend
    env: node
    rootDir: server
    buildCommand: npm install --omit=dev
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5001
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: MSG91_AUTH_KEY
        sync: false
      - key: MSG91_SENDER_ID
        sync: false
      - key: OTP_MOCK
        value: "false"
      - key: CRON_SECRET
        sync: false
      - key: REMINDER_TIMEZONE
        value: Asia/Kolkata
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PHONE
        sync: false
      - key: FRONTEND_URL
        value: https://learning-tracker-two-xi.vercel.app

  # FREE: use cron-job.org to POST /api/cron/reminders every 5 min (see docs/DEPLOYMENT_ENV.md).
  # Paid Render cron below is optional — delete this block if using cron-job.org only.
  - type: cron
    name: learning-tracker-reminders
    env: node
    schedule: "* * * * *"
    rootDir: server
    buildCommand: npm install --omit=dev
    startCommand: node scripts/pingReminders.js
    envVars:
      - key: CRON_SECRET
        sync: false
      - key: API_URL
        value: https://learning-tracker-api-hqzm.onrender.com/api/cron/reminders
