services:
  - type: web
    name: devtrack-backend
    env: node
    rootDir: server
    buildCommand: npm install --omit=dev
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5001
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: Learning Tracker <teja26kt@gmail.com>
      - key: OTP_MOCK
        value: "false"
      - key: CRON_SECRET
        sync: false
      - key: REMINDER_TIMEZONE
        value: Asia/Kolkata
      - key: ADMIN_EMAIL
        sync: false
      - key: FRONTEND_URL
        value: https://learning-tracker-two-xi.vercel.app

  # Reminders: use free cron-job.org — see docs/LAUNCH.md (no paid Render cron needed).
