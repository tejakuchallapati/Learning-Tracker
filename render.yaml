services:
  - type: web
    name: devtrack-backend
    env: node
    # Root directory must be "backend" (not the legacy "server" folder).
    rootDir: backend
    buildCommand: npm install --omit=dev
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5001
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: FRONTEND_URL
        value: https://learning-tracker-two-xi.vercel.app
